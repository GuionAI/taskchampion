name: Update Swift Bindings

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "taskchampion-ffi/**"
      - "uniffi.toml"

permissions:
  contents: write

jobs:
  update-bindings:
    runs-on: macos-latest

    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.GUION_RELEASE_APP_ID }}
          private-key: ${{ secrets.GUION_RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1 (stable)
        with:
          toolchain: stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bindings-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bindings-

      # Fast host-native debug build — only needed for uniffi-bindgen metadata,
      # not for the actual xcframework. ~1-2min vs ~10min for iOS release cross-compile.
      - name: Build host-native debug library for bindgen metadata
        run: cargo build -p taskchampion-ffi --lib

      - name: Generate Swift bindings
        run: |
          mkdir -p Sources/TaskChampionFFI
          cargo run -p taskchampion-ffi --bin uniffi-bindgen -- generate \
            --library target/debug/libtaskchampion_ffi.dylib \
            --language swift \
            --out-dir target/generated
          cp target/generated/TaskChampionFFI.swift Sources/TaskChampionFFI/TaskChampionFFI.swift

      - name: Commit updated Swift bindings if changed
        run: |
          git config user.name "guion-release-bot[bot]"
          git config user.email "guion-release-bot[bot]@users.noreply.github.com"
          git add Sources/TaskChampionFFI/TaskChampionFFI.swift
          git diff --cached --quiet && { echo "Swift bindings unchanged — nothing to commit"; exit 0; }
          git commit -m "chore(ffi): update generated Swift bindings"
          git push origin main
