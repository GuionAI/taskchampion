name: Release XCFramework

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.GUION_RELEASE_APP_ID }}
          private-key: ${{ secrets.GUION_RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1 (stable)
        with:
          toolchain: stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build XCFramework
        run: ./scripts/build_xcframework.sh

      - name: Zip XCFramework
        run: |
          zip -r TaskChampionFFIFFI.xcframework.zip TaskChampionFFIFFI.xcframework
          [ -s TaskChampionFFIFFI.xcframework.zip ] || { echo "ERROR: zip archive is empty or missing"; exit 1; }

      - name: Compute SHA-256 checksum
        id: checksum
        run: |
          shasum -a 256 TaskChampionFFIFFI.xcframework.zip > checksum.txt
          CHECKSUM=$(awk '{print $1}' checksum.txt)
          if [ ${#CHECKSUM} -ne 64 ]; then
            echo "ERROR: unexpected checksum length (${#CHECKSUM}): '${CHECKSUM}'" >&2
            exit 1
          fi
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload XCFramework zip
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          generate_release_notes: true
          files: TaskChampionFFIFFI.xcframework.zip

      - name: Commit updated Package.swift to main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_URL: https://github.com/GuionAI/taskchampion/releases/download/${{ github.ref_name }}/TaskChampionFFIFFI.xcframework.zip
          RELEASE_CHECKSUM: ${{ steps.checksum.outputs.checksum }}
        run: |
          git config user.name "guion-release-bot[bot]"
          git config user.email "guion-release-bot[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          python3 -c "
          import re, os, sys

          url = os.environ['RELEASE_URL']
          checksum = os.environ['RELEASE_CHECKSUM']

          if not re.fullmatch(r'[0-9a-f]{64}', checksum):
              print(f'ERROR: checksum is not 64 hex chars: {checksum!r}', file=sys.stderr)
              sys.exit(1)

          with open('Package.swift', 'r') as f:
              content = f.read()

          original = content

          content, url_count = re.subn(r'url: \"[^\"]*\"', f'url: \"{url}\"', content)
          content, checksum_count = re.subn(r'checksum: \"[^\"]*\"', f'checksum: \"{checksum}\"', content)

          if url_count != 1 or checksum_count != 1:
              print(f'ERROR: expected exactly 1 substitution each, got url={url_count} checksum={checksum_count}', file=sys.stderr)
              sys.exit(1)

          if content == original:
              print('Package.swift already points to this release — no update needed')
              sys.exit(0)

          with open('Package.swift', 'w') as f:
              f.write(content)
          "
          git add Package.swift
          git diff --cached --quiet && { echo "Package.swift already up to date — nothing to commit"; exit 0; }
          git commit -m "chore(spm): update Package.swift for ${{ github.ref_name }} release"
          git push origin main
